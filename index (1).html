window.storage = {
  get: async (k, s = false) => {
    try {
      const v = localStorage.getItem((s ? "s_" : "u_") + k);
      return v ? {
        key: k,
        value: v
      } : null;
    } catch {
      return null;
    }
  },
  set: async (k, v, s = false) => {
    try {
      localStorage.setItem((s ? "s_" : "u_") + k, v);
      return {
        key: k,
        value: v
      };
    } catch {
      return null;
    }
  },
  delete: async (k, s = false) => {
    try {
      localStorage.removeItem((s ? "s_" : "u_") + k);
      return {
        key: k,
        deleted: true
      };
    } catch {
      return null;
    }
  },
  list: async (p = "", s = false) => {
    try {
      const px = (s ? "s_" : "u_") + p;
      return {
        keys: Object.keys(localStorage).filter(k => k.startsWith(px)).map(k => k.replace(/^[su]_/, ""))
      };
    } catch {
      return {
        keys: []
      };
    }
  }

function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text);
      return;
    }
  } catch (e) {}
  const el = document.createElement("textarea");
  el.value = text;
  el.style.position = "fixed";
  el.style.opacity = "0";
  document.body.appendChild(el);
  el.focus();
  el.select();
  try {
    document.execCommand("copy");
  } catch (e) {}
  document.body.removeChild(el);
}
